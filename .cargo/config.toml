# Kernel builds pass `-Zbuild-std` and `--target` explicitly via `build_rustos.sh` /
# `make build`. Do not enable `build-std` here: it applies to every `cargo` invocation
# under this repo (including `glib-native` host tests) and causes duplicate `alloc`
# lang items when `#[cfg(test)]` links the host `std` library.

[build]
target = "x86_64-rustos.json"

[target.x86_64-rustos]
runner = "bootimage runner"
rustflags = ["-C", "debug-assertions=off"]

[env]
CARGO_TARGET_X86_64_RUSTOS_RUNNER = "bootimage runner"
RUST_BACKTRACE = "1"

[profile.test]
panic = "unwind"

[alias]
build-x86 = "build --target x86_64-rustos.json"
build-arm = "build --lib --target aarch64-apple-rustos.json"
build-lib = "build --lib"
