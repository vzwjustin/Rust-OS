# RustOS GNOME overlay manifest.
#
# This layer prepares GNOME userspace expectations. Full GNOME launch still
# depends on the kernel-side readiness profile reporting graphics, input,
# Linux ABI, D-Bus, Wayland, and DRM/KMS support.

session_launcher=/usr/bin/rustos-gnome-session
compositor_launcher=/usr/bin/rustos-mutter
status_file=/run/rustos-gnome-session.status
runtime_dir=/run/user/0
wayland_display=wayland-0
session_type=wayland
